name: main

on:
  workflow_dispatch:
    inputs:
      package-version:
        type: string
        description: Package version
        required: false
      deploy:
        type: boolean
        description: Deploy package
        required: false
        default: false
  push:
    branches:
      - prime
    tags:
      - "*"
  pull_request:
    branches:
      - prime

jobs:
  main:
    uses: Tyrrrz/.github/.github/workflows/nuget.yml@prime
    with:
      dotnet-version: |
        5.0.x
        10.0.x
      # We use .NET Framework as the base framework for testing polyfills and it
      # can only run on Windows.
      windows-only: true
      deploy: ${{ inputs.deploy || github.ref_type == 'tag' }}
      package-version: ${{ inputs.package-version || (github.ref_type == 'tag' && github.ref_name) || format('0.0.0-ci-{0}', github.sha) }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
